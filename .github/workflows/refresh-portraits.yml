name: Refresh champion portraits

# Once a week, look up portrait URLs for any newly-added champions (from
# Fandom wiki + mcochub fallback), mirror the images locally under
# static/portraits/, and commit any changes. Keeps portraits self-sustaining
# as new champions are released without manual intervention.

on:
  schedule:
    - cron: "0 7 * * 1"  # 07:00 UTC every Monday
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-portraits
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Discover portrait URLs for any new champions
        run: python fetch_portraits.py

      - name: Mirror new portraits into static/portraits/
        run: python download_portraits.py

      - name: Commit changes if any
        run: |
          # Only commit the portrait-related artifacts; don't sweep up
          # anything else the workflow might have touched.
          git add portraits.json portraits_local.json static/portraits/
          if git diff --cached --quiet; then
            echo "No portrait changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh champion portraits (auto)"
          git push
